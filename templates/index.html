<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPUT Scraper Grid</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <h2>BPUT_SCRAPER_v2</h2>
        </div>

        <form id="settingsForm" class="settings-section">
            <div class="field">
                <label>Start Registration No</label>
                <input type="number" id="start_reg" placeholder="2301..." required>
            </div>
            
            <div class="field">
                <label>End Registration No</label>
                <input type="number" id="end_reg" placeholder="2301..." required>
            </div>

            <div class="field">
                <select id="session_select" required>
                    {% for s in sessions %}
                    <option value="{{ s.value }}" {% if loop.first %}selected{% endif %}>{{ s.text }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="field">
                <label>Threads / Retries</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                    <input type="number" id="threads" value="10" min="1">
                    <input type="number" id="retries" value="3" min="0">
                </div>
            </div>

            <button type="submit" id="startBtn" class="btn-primary">Execute Batch</button>
        </form>

        <div class="reports-section">
            <div class="reports-header">
                <h3>History / Reports</h3>
            </div>
            <div id="reportsList" class="reports-list">
                <!-- Loaded via JS -->
            </div>
        </div>

        <div class="sidebar-footer">
            <p style="font-size: 0.6rem;">Developed By:</p>
            <a href="https://github.com/srsoumyax11" target="_blank" style="text-decoration: none; color: inherit; display: block;">
                <div style="font-size: 1rem; font-weight: 700; color: var(--accent);">
                    <i class="fab fa-github"></i> srsoumyax11
                </div>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div class="progress-line" id="progressLine"></div>

        <div id="sectionsContainer" class="main-content" style="padding: 0.5rem; overflow-y: auto;">
            <!-- Tables will be injected here dynamically by Branch & Semester -->
        </div>
    </main>

    <script>
        const settingsForm = document.getElementById('settingsForm');
        const startBtn = document.getElementById('startBtn');
        const reportsList = document.getElementById('reportsList');
        const sectionsContainer = document.getElementById('sectionsContainer');
        const progressLine = document.getElementById('progressLine');
        
        let eventSource = null;
        let tableRegistry = {}; // key: "Branch_Sem" -> { tableBody, tableHeadRow, subjectHeaders }
        let totalToFetch = 0;
        let fetchedCount = 0;

        async function loadReports() {
            try {
                const resp = await fetch('/api/reports');
                const reports = await resp.json();
                reportsList.innerHTML = reports.map(r => `
                    <a href="/download/${r.filename}" class="report-item">
                        <span>${r.filename}</span>
                        <span>⬇</span>
                    </a>
                `).join('');
            } catch (e) {}
        }

        settingsForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const start = parseInt(document.getElementById('start_reg').value);
            const end = parseInt(document.getElementById('end_reg').value);
            const session = document.getElementById('session_select').value;
            const threads = document.getElementById('threads').value;
            const retries = document.getElementById('retries').value;

            // Reset UI
            sectionsContainer.innerHTML = '';
            tableRegistry = {};
            progressLine.style.width = '0%';
            
            totalToFetch = end - start + 1;
            fetchedCount = 0;

            // Create a "Pending Queue" section
            createSection("PENDING_QUEUE", "Processing Queue (Please Wait)");

            for(let r = start; r <= end; r++) {
                const tr = document.createElement('tr');
                tr.id = `row-${r}`;
                tr.className = 'loading-row';
                tr.innerHTML = `
                    <td class="roll-cell">${r}</td>
                    <td colspan="2">FETCHING DATA...</td>
                `;
                tableRegistry["PENDING_QUEUE"].tableBody.appendChild(tr);
            }

            startBtn.disabled = true;
            startBtn.textContent = 'RUNNING...';

            if (eventSource) eventSource.close();

            const url = `/stream-results?start_reg=${start}&end_reg=${end}&session=${session}&threads=${threads}&retries=${retries}`;
            eventSource = new EventSource(url);

            eventSource.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                // No more global header updates

                if (msg.type === 'student') {
                    const student = msg.data;
                    fetchedCount++;
                    progressLine.style.width = `${(fetchedCount / totalToFetch) * 100}%`;
                    updateStudentRow(student);
                }

                if (msg.type === 'complete') {
                    startBtn.disabled = false;
                    startBtn.textContent = 'Execute Batch';
                    eventSource.close();
                    
                    // Auto-download the report
                    if (msg.report_url) {
                        const link = document.createElement('a');
                        link.href = msg.report_url;
                        link.download = '';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }

                    if (tableRegistry["PENDING_QUEUE"].tableBody.rows.length === 0) {
                        document.getElementById('section-PENDING_QUEUE').remove();
                    }
                    loadReports();
                }
            };

            eventSource.onerror = () => {
                startBtn.disabled = false;
                startBtn.textContent = 'Execute Batch';
                eventSource.close();
            };
        });

        function createSection(id, title) {
            const section = document.createElement('div');
            section.id = `section-${id}`;
            section.className = 'table-container';
            const isQueue = id === "PENDING_QUEUE";
            
            section.innerHTML = `
                <div class="table-header">
                    <div class="section-title">
                        <span style="opacity: 0.5;">#</span> ${title}
                    </div>
                    <div class="table-controls">
                        ${!isQueue ? `
                            <button class="icon-btn" onclick="downloadPDF('${id}', '${title}')">PDF REPORT</button>
                            <button class="icon-btn" onclick="toggleSection('${id}')">VIEW / HIDE</button>
                        ` : ''}
                    </div>
                </div>
                ${!isQueue ? `
                <div class="stats-bar" id="stats-${id}">
                    <div class="stat-item">
                        <span class="stat-label">Total Students</span>
                        <span class="stat-value" id="stat-total-${id}">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Result Status</span>
                        <span class="stat-value" id="stat-status-${id}">P: 0 | B: 0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Average SGPA</span>
                        <span class="stat-value" id="stat-avg-${id}">0.00</span>
                    </div>
                </div>
                ` : ''}
                <div class="table-wrapper">
                    <table id="table-${id}">
                        <thead>
                            <tr>
                                <th style="width: 120px;">Roll No</th>
                                <th>Student Name</th>
                                <th style="width: 80px; text-align: center;">SGPA</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            `;
            
            if (isQueue) {
                sectionsContainer.appendChild(section);
            } else {
                // Sorting logic: Higher semesters first, grouped by branch
                const queueEl = document.getElementById('section-PENDING_QUEUE');
                const existingSections = Array.from(sectionsContainer.children).filter(el => el.id !== 'section-PENDING_QUEUE');
                
                let inserted = false;
                for (let existing of existingSections) {
                    const existingTitle = existing.querySelector('.section-title').textContent.replace('#', '').trim();
                    // Basic sort comparison: Branch first, then Sem number descending
                    if (compareSectionTitles(title, existingTitle) < 0) {
                        sectionsContainer.insertBefore(section, existing);
                        inserted = true;
                        break;
                    }
                }
                
                if (!inserted) {
                    if (queueEl) {
                        sectionsContainer.insertBefore(section, queueEl);
                    } else {
                        sectionsContainer.appendChild(section);
                    }
                }
            }

            tableRegistry[id] = {
                tableBody: section.querySelector('tbody'),
                tableHeadRow: section.querySelector('thead tr'),
                subjectHeaders: [],
                students: []
            };
        }

        function compareSectionTitles(t1, t2) {
            // "CIVIL ENGINEERING - 5th Semester" vs "CIVIL ENGINEERING - 3rd Semester"
            const b1 = t1.split('-')[0].trim();
            const b2 = t2.split('-')[0].trim();
            
            if (b1 !== b2) return b1.localeCompare(b2);
            
            // Same branch, sort by semester number descending
            const s1 = parseInt(t1.match(/\d+/) || 0);
            const s2 = parseInt(t2.match(/\d+/) || 0);
            return s2 - s1; 
        }

        function toggleSection(id) {
            const el = document.getElementById(`section-${id}`);
            el.classList.toggle('collapsed');
        }

        function downloadPDF(id, title) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');
            
            doc.setFont("helvetica", "bold");
            doc.setFontSize(18);
            doc.text("BPUT ACADEMIC REPORT", 14, 15);
            doc.setFontSize(11);
            doc.setFont("helvetica", "normal");
            doc.text(`Group: ${title}`, 14, 22);
            doc.text(`Generated: ${new Date().toLocaleString()}`, 14, 27);

            doc.autoTable({
                html: `#table-${id}`,
                startY: 35,
                theme: 'grid',
                styles: { 
                    fontSize: 8, 
                    cellPadding: 2, 
                    textColor: [40, 40, 40], 
                    lineColor: [220, 220, 220] 
                },
                headStyles: { 
                    fillColor: [99, 102, 241], // Indigo Accent
                    textColor: [255, 255, 255], 
                    fontStyle: 'bold' 
                },
                alternateRowStyles: { 
                    fillColor: [248, 250, 252] 
                },
                didParseCell: function(data) {
                    if (data.section === 'body') {
                        const cellText = data.cell.text[0];
                        if (cellText === 'F' || cellText === 'M') {
                            data.cell.styles.textColor = [220, 38, 38]; // Red
                            data.cell.styles.fontStyle = 'bold';
                        } else if (['S','O','E'].includes(cellText)) {
                            data.cell.styles.textColor = [5, 150, 105]; // Green
                        }
                    }
                }
            });

            doc.save(`${title.replace(/\s+/g, '_')}.pdf`);
        }

        function updateStudentRow(data) {
            const roll = data.roll_no;
            const loadingRow = document.getElementById(`row-${roll}`);
            const info = data.student_info || {};
            const name = info.studentName || "N/A";
            const branch = info.branchName || "UNKNOWN BRANCH";
            
            const semIds = Object.keys(data.detailed_results || {});
            
            if (semIds.length === 0) {
                if (loadingRow) {
                    loadingRow.innerHTML = `
                        <td class="roll-cell">${roll}</td>
                        <td class="name-cell">${name}</td>
                        <td colspan="2" style="color: var(--text-muted); font-style: italic;">
                            ${data.errors && data.errors.length > 0 ? data.errors[0].message : 'NO DATA FOUND'}
                        </td>
                    `;
                    loadingRow.classList.remove('loading-row');
                }
                return;
            }

            semIds.forEach((semId) => {
                const details = data.detailed_results[semId];
                const grades = details.grades || [];
                const sgpaVal = details.sgpadetails?.sgpa || "0";
                const sgpa = details.sgpadetails?.sgpa || "N/A";
                const semName = grades.length > 0 ? grades[0].semester : semId;
                
                // Identify the branch abbreviation for cleaner title
                const branchTitle = branch.split('(').pop().replace(')', '').trim() || branch;
                // Sanitize ID: remove all non-alphanumeric chars except underscores
                const sectionId = `${branchTitle.replace(/[^a-zA-Z0-9]/g, '_')}_${semName.replace(/[^a-zA-Z0-9]/g, '_')}`;
                const sectionTitle = `${branchTitle} - ${semName} Semester`;

                if (!tableRegistry[sectionId]) {
                    createSection(sectionId, sectionTitle);
                }

                const reg = tableRegistry[sectionId];
                const hasBack = grades.some(g => g.grade === 'F' || g.grade === 'M' || g.grade === 'S'); // Simple back check

                // Update headers
                let headersChanged = false;
                grades.forEach(g => {
                    const code = g.subjectCODE;
                    if (code && !reg.subjectHeaders.includes(code)) {
                        reg.subjectHeaders.push(code);
                        const th = document.createElement('th');
                        th.textContent = code;
                        th.style.textAlign = "center";
                        reg.tableHeadRow.appendChild(th);
                        headersChanged = true;
                    }
                });

                if (headersChanged) {
                    Array.from(reg.tableBody.rows).forEach(r => {
                        while (r.cells.length < reg.tableHeadRow.cells.length) {
                            const td = document.createElement('td');
                            td.className = 'grade-cell';
                            td.textContent = '-';
                            r.appendChild(td);
                        }
                    });
                }

                // Add to section table
                const row = document.createElement('tr');
                let sgpaClass = parseFloat(sgpaVal) < 6 ? 'badge-fail' : (parseFloat(sgpaVal) >= 8 ? 'badge-pass' : 'badge-sgpa');
                
                let html = `
                    <td class="roll-cell">${roll}</td>
                    <td class="name-cell">${name}</td>
                    <td class="sgpa-cell"><span class="badge ${sgpaClass}">${sgpa}</span></td>
                `;

                reg.subjectHeaders.forEach(code => {
                    const g = grades.find(x => x.subjectCODE === code);
                    const gradeText = g ? g.grade : '-';
                    html += `<td class="grade-cell grade-${gradeText}">${gradeText}</td>`;
                });

                row.innerHTML = html;
                reg.tableBody.appendChild(row);

                // Update Stats
                reg.students.push({ sgpa: parseFloat(sgpaVal) || 0, isBack: hasBack });
                updateStats(sectionId);
            });

            if (loadingRow) loadingRow.remove();
        }

        function updateStats(id) {
            const reg = tableRegistry[id];
            const total = reg.students.length;
            const backs = reg.students.filter(s => s.isBack).length;
            const passes = total - backs;
            const avg = reg.students.reduce((a, b) => a + b.sgpa, 0) / total;

            document.getElementById(`stat-total-${id}`).textContent = total;
            document.getElementById(`stat-status-${id}`).textContent = `P: ${passes} | B: ${backs}`;
            document.getElementById(`stat-avg-${id}`).textContent = avg.toFixed(2);
            
            sortTableRows(id);
        }

        function sortTableRows(id) {
            const tbody = document.querySelector(`#table-${id} tbody`);
            const rows = Array.from(tbody.querySelectorAll('tr'));
            
            rows.sort((a, b) => {
                const rollA = parseInt(a.querySelector('.roll-cell').textContent);
                const rollB = parseInt(b.querySelector('.roll-cell').textContent);
                return rollA - rollB;
            });
            
            rows.forEach(row => tbody.appendChild(row));
        }

        loadReports();
    </script>
</body>
</html>
