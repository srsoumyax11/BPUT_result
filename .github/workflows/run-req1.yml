name: Run REQ1 - Get Results List

on:
  workflow_dispatch:
    inputs:
      roll_no:
        description: 'Student Roll Number'
        required: true
        default: '2301110123'
      dob:
        description: 'Date of Birth (YYYY-MM-DD)'
        required: true
        default: '2020-01-28'
      session:
        description: 'Exam Session'
        required: true
        default: 'Odd-(2025-26)'

jobs:
  run-req1:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run REQ1 Test
        run: |
          python -c "
import requests
import json

url = 'https://results.bput.ac.in/student-results-list'
params = {
    'rollNo': '${{ github.event.inputs.roll_no }}',
    'dob': '${{ github.event.inputs.dob }}',
    'session': '${{ github.event.inputs.session }}'
}

headers = {
    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/138.0.0.0 Safari/537.36',
    'Content-Type': 'application/json; charset=utf-8',
    'X-Requested-With': 'XMLHttpRequest'
}

print('=' * 60)
print('REQ1: Get Available Results List')
print('=' * 60)
print(f'URL: {url}')
print(f'Roll No: {params[\"rollNo\"]}')
print(f'DOB: {params[\"dob\"]}')
print(f'Session: {params[\"session\"]}')
print('=' * 60)

try:
    response = requests.post(url, params=params, headers=headers, timeout=10)
    print(f'✓ Status Code: {response.status_code}')
    print()
    
    if response.status_code == 200:
        data = response.json()
        print('✓ Response Type:', type(data))
        print('✓ Response Length:', len(data) if isinstance(data, list) else 'Object')
        print()
        print('Response Data:')
        print(json.dumps(data, indent=2))
    else:
        print(f'✗ Error: {response.status_code}')
        print(f'Response: {response.text}')
        
except requests.exceptions.Timeout:
    print('✗ Error: Request timed out')
except requests.exceptions.ConnectionError:
    print('✗ Error: Connection failed')
except Exception as e:
    print(f'✗ Error: {str(e)}')
"
