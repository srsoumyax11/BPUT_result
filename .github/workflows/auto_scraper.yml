name: BPUT Session Watcher

on:
  schedule:
    # Runs at minute 3 of every hour (e.g. 1:03, 2:03, 3:03...)
    - cron: '3 * * * *'
  workflow_dispatch: # Manual trigger

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Check for New Session
        run: python monitor.py

      - name: Update Last Session State
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "BPUT-Bot"
          git add api_test/last_session.txt
          git commit -m "Update last processed session state [skip ci]" || echo "No changes"
          git push
